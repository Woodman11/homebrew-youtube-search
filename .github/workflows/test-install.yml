# What this workflow does:
# Every time we push to main (or open a PR), GitHub spins up a clean macOS
# VM, installs the formula from this checkout, starts the server, and pokes
# it to make sure it actually works. Catches formula breakage before users
# see it.

name: Test install

# `on:` declares the events that trigger the workflow.
on:
  push:
    branches: [main]      # run on every push to main
  pull_request:           # run on every PR opened against this repo
  workflow_dispatch:      # also adds a "Run workflow" button in the Actions tab

# A workflow has one or more `jobs`. Jobs run in parallel by default.
jobs:
  install:
    # macos-14 = Apple Silicon (arm64). macos-13 (Intel) was dropped from
    # the matrix because GitHub's free Intel runners are throttled to the
    # point of starvation — jobs sat queued for 16+ hours and never ran.
    # If Intel coverage is needed, run `brew install` on a real Intel Mac.
    runs-on: macos-14

    # Steps run sequentially inside the VM. Each step is either a shell
    # command (`run:`) or a reusable action (`uses:`).
    steps:
      # actions/checkout is GitHub's prebuilt step that clones the repo
      # into the VM so subsequent steps can read its files.
      - uses: actions/checkout@v5

      # Install the formula from this checkout (not the published tap).
      # That way a broken formula commit fails CI before it goes live.
      # Modern brew rejects bare formula paths — formulae must live in a
      # tap. `brew tap <name> <path>` registers our checkout as the tap,
      # then we install via the fully-qualified name.
      - name: Tap from checkout and install
        run: |
          brew tap Woodman11/reelm "$GITHUB_WORKSPACE"
          brew install Woodman11/reelm/reelm

      # Smoke test: did the binaries land on PATH and run at all?
      - name: Verify CLI binaries
        run: which reelm reelm-maintain

      # Start the server in the background, then poll until it's listening.
      - name: Start server and wait for /stats
        run: |
          reelm serve > /tmp/server.log 2>&1 &
          for i in {1..15}; do
            if curl -sf http://localhost:7799/stats > /dev/null; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to bind 7799 within 15s"
          cat /tmp/server.log
          exit 1

      # On a fresh install the DB is empty, so /stats should report zeros.
      # JSON is compact (no spaces) — match accordingly.
      - name: Verify /stats returns empty fresh state
        run: |
          curl -sf http://localhost:7799/stats | tee /tmp/stats.json
          grep -q '"total":0' /tmp/stats.json
          grep -q '"indexed":0' /tmp/stats.json

      # Maintenance should run cleanly even with an empty DB.
      - name: Run maintenance once
        run: reelm maintain

      # `if: failure()` only runs this step when an earlier step failed —
      # gives us the server log to diagnose what went wrong.
      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/server.log || true
